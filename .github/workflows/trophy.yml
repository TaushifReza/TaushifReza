name: GitHub Trophy
on:
  schedule:
    - cron: "0 0 * * *" # Runs every night at midnight
  workflow_dispatch:   # Allows to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # This step ensures there isn't a folder named trophy.svg blocking the file
      - name: Cleanup existing paths
        run: rm -rf trophy.svg
        
      - uses: ryo-ma/github-profile-trophy@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: TaushifReza
          theme: onedark
          # Explicitly tell it to save in the root
          output_path: ./trophy.svg
          
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update Trophies" || exit 0
          git push
