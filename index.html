<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Taushif Reza</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230A0A0A'/><text x='9' y='23' font-family='monospace' font-size='20' font-weight='700' fill='%23A78BFA'>&gt;</text></svg>"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #0a0a0a;
                --fg: #d4d4d4;
                --muted: #555555;
                --accent: #a78bfa;
                --accent-rgb: 167, 139, 250;
                --grid-line: #131313;
                --rocket-w: clamp(20px, 4.5vw, 34px);
                --rocket-h: clamp(35px, 7.8vw, 60px);
                --accent-cyan: #06b6d4;
                --accent-amber: #f59e0b;
                --accent-emerald: #10b981;
                --accent-rose: #f43f5e;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                height: 100%;
                overflow: hidden;
                cursor: none;
                touch-action: manipulation;
                -webkit-user-select: none;
                user-select: none;
            }

            body {
                background-color: var(--bg);
                color: var(--fg);
                font-family: "JetBrains Mono", monospace;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            }

            body::after {
                content: "";
                position: fixed;
                inset: 0;
                background: radial-gradient(
                    ellipse at center,
                    transparent 80%,
                    rgba(0, 0, 0, 0.5) 100%
                );
                pointer-events: none;
                z-index: 99;
            }

            a,
            button {
                cursor: none;
                touch-action: manipulation;
            }

            .cursor-dot {
                position: fixed;
                width: 6px;
                height: 6px;
                background: var(--accent);
                border-radius: 50%;
                pointer-events: none;
                z-index: 9999;
                transform: translate(-50%, -50%);
                box-shadow:
                    0 0 6px rgba(var(--accent-rgb), 0.5),
                    0 0 14px rgba(var(--accent-rgb), 0.2);
                transition:
                    width 0.25s ease,
                    height 0.25s ease,
                    opacity 0.25s ease,
                    background 0.25s ease,
                    box-shadow 0.25s ease;
            }

            .cursor-ring {
                position: fixed;
                width: 36px;
                height: 36px;
                border: 1px solid rgba(var(--accent-rgb), 0.35);
                border-radius: 50%;
                pointer-events: none;
                z-index: 9998;
                transform: translate(-50%, -50%);
                transition:
                    width 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                    height 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                    border-color 0.3s ease,
                    background 0.3s ease,
                    box-shadow 0.3s ease;
            }

            .cursor-ring.hovering {
                width: 56px;
                height: 56px;
                border-color: rgba(var(--accent-rgb), 0.6);
                background: rgba(var(--accent-rgb), 0.04);
                box-shadow:
                    0 0 20px rgba(var(--accent-rgb), 0.08),
                    inset 0 0 10px rgba(var(--accent-rgb), 0.03);
            }

            .cursor-dot.hovering {
                opacity: 0.5;
                width: 4px;
                height: 4px;
            }

            .cursor-crosshair {
                position: fixed;
                pointer-events: none;
                z-index: 9997;
                transform: translate(-50%, -50%);
                transition: opacity 0.3s ease;
            }

            .cursor-crosshair .ch-h,
            .cursor-crosshair .ch-v {
                position: absolute;
                background: rgba(var(--accent-rgb), 0.12);
            }

            .cursor-crosshair .ch-h {
                width: 14px;
                height: 1px;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            .cursor-crosshair .ch-v {
                width: 1px;
                height: 14px;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            .cursor-crosshair.hovering {
                opacity: 0;
            }

            .planet-label {
                position: fixed;
                z-index: 5;
                pointer-events: none;
                font-family: "JetBrains Mono", monospace;
                font-size: clamp(0.45rem, 1vw, 0.55rem);
                letter-spacing: 0.15em;
                text-transform: uppercase;
                white-space: nowrap;
                padding: 6px 12px 5px;
                background: rgba(10, 10, 10, 0.9);
                border: 1px solid rgba(var(--accent-rgb), 0.12);
                opacity: 0;
                transform: translateY(4px);
                transition:
                    opacity 0.3s ease,
                    transform 0.3s ease;
                backdrop-filter: blur(6px);
            }

            .planet-label.visible {
                opacity: 1;
                transform: translateY(0);
            }

            .planet-label-name {
                color: var(--accent);
                font-weight: 500;
                font-size: clamp(0.5rem, 1.1vw, 0.6rem);
            }

            .planet-label-stats {
                color: #444;
                font-weight: 300;
                font-size: clamp(0.38rem, 0.85vw, 0.45rem);
                margin-top: 2px;
                letter-spacing: 0.08em;
            }

            .planet-label-skills {
                color: #333;
                font-weight: 300;
                font-size: clamp(0.35rem, 0.75vw, 0.42rem);
                margin-top: 4px;
                letter-spacing: 0.06em;
            }

            .planet-label-skills span {
                padding: 1px 5px;
                border: 1px solid #222;
                margin-right: 3px;
            }

            .planet-label-skills span.sk-orbit {
                border-color: rgba(6, 182, 212, 0.3);
                color: rgba(6, 182, 212, 0.7);
            }

            .planet-label-skills span.sk-warp {
                border-color: rgba(245, 158, 11, 0.3);
                color: rgba(245, 158, 11, 0.7);
            }

            .planet-label-skills span.sk-mine {
                border-color: rgba(244, 63, 94, 0.3);
                color: rgba(244, 63, 94, 0.7);
            }

            .planet-label-skills span.sk-tractor {
                border-color: rgba(16, 185, 129, 0.3);
                color: rgba(16, 185, 129, 0.7);
            }

            .init-overlay {
                position: fixed;
                inset: 0;
                z-index: 999;
                background: #0a0a0a;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                cursor: none;
                opacity: 1;
                transition:
                    opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .init-overlay.hidden {
                opacity: 0;
                transform: scale(1.02);
                pointer-events: none;
            }

            .init-inner {
                position: relative;
                z-index: 2;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
            }

            .init-overlay::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image:
                    linear-gradient(rgba(19, 19, 19, 0.5) 1px, transparent 1px),
                    linear-gradient(
                        90deg,
                        rgba(19, 19, 19, 0.5) 1px,
                        transparent 1px
                    );
                background-size: 48px 48px;
                animation: gridShift 20s linear infinite;
                opacity: 0.4;
            }

            .init-prompt {
                font-family: "JetBrains Mono", monospace;
                font-size: clamp(0.7rem, 2vw, 0.9rem);
                color: var(--muted);
                letter-spacing: 0.1em;
                border: 1px solid #222;
                padding: 12px 28px;
                transition:
                    color 0.3s ease,
                    border-color 0.3s ease,
                    box-shadow 0.3s ease,
                    transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            }

            .init-overlay:hover .init-prompt {
                color: var(--accent);
                border-color: rgba(var(--accent-rgb), 0.4);
                box-shadow:
                    0 0 20px rgba(var(--accent-rgb), 0.08),
                    inset 0 0 20px rgba(var(--accent-rgb), 0.03);
                transform: scale(1.02);
            }

            .init-sub {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.45rem;
                color: #333;
                margin-top: 14px;
                letter-spacing: 0.12em;
                transition: color 0.3s ease;
            }

            .init-overlay:hover .init-sub {
                color: #444;
            }

            .init-pulse {
                width: 6px;
                height: 6px;
                background: var(--accent);
                border-radius: 50%;
                margin: 0 auto 20px;
                box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.4);
                animation: initPulse 1.5s ease-in-out infinite;
            }

            @keyframes initPulse {
                0%,
                100% {
                    transform: scale(1);
                    opacity: 0.6;
                }

                50% {
                    transform: scale(1.6);
                    opacity: 1;
                }
            }

            @media (max-width: 480px) {
                .planet-label,
                .rocket-tooltip,
                .hud-compass,
                .hud-speed {
                    display: none !important;
                }
            }

            @media (hover: none) {
                .cursor-dot,
                .cursor-ring,
                .cursor-crosshair {
                    display: none !important;
                }

                html,
                body,
                a,
                button {
                    cursor: auto !important;
                }
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image:
                    radial-gradient(
                        1px 1px at 10% 20%,
                        rgba(167, 139, 250, 0.15),
                        transparent
                    ),
                    radial-gradient(
                        1px 1px at 80% 10%,
                        rgba(255, 255, 255, 0.08),
                        transparent
                    ),
                    radial-gradient(
                        1px 1px at 45% 75%,
                        rgba(167, 139, 250, 0.1),
                        transparent
                    ),
                    radial-gradient(
                        1px 1px at 90% 60%,
                        rgba(255, 255, 255, 0.06),
                        transparent
                    ),
                    radial-gradient(
                        1px 1px at 25% 50%,
                        rgba(255, 255, 255, 0.05),
                        transparent
                    ),
                    radial-gradient(
                        1px 1px at 65% 35%,
                        rgba(167, 139, 250, 0.08),
                        transparent
                    ),
                    radial-gradient(
                        1px 1px at 15% 85%,
                        rgba(255, 255, 255, 0.07),
                        transparent
                    ),
                    radial-gradient(
                        1px 1px at 50% 10%,
                        rgba(255, 255, 255, 0.04),
                        transparent
                    );
                pointer-events: none;
                z-index: 0;
            }

            .grid-layer {
                position: fixed;
                inset: 0;
                background-image:
                    linear-gradient(var(--grid-line) 1px, transparent 1px),
                    linear-gradient(
                        90deg,
                        var(--grid-line) 1px,
                        transparent 1px
                    );
                background-size: 48px 48px;
                pointer-events: none;
                z-index: 0;
                animation: gridShift 20s linear infinite;
                transition: filter 0.5s ease;
            }

            .grid-layer.warp {
                animation-duration: 0.5s;
                filter: blur(1px) brightness(1.5);
            }

            @keyframes gridShift {
                0% {
                    background-position: 0 0;
                }

                100% {
                    background-position: 48px 48px;
                }
            }

            .pulse-ring {
                position: fixed;
                top: 50%;
                left: 50%;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                border: 1px solid rgba(var(--accent-rgb), 0.15);
                transform: translate(-50%, -50%) scale(1);
                pointer-events: none;
                z-index: 0;
                animation: pulseExpand 6s ease-out infinite;
            }

            .pulse-ring:nth-child(2) {
                animation-delay: 2s;
            }

            .pulse-ring:nth-child(3) {
                animation-delay: 4s;
            }

            @keyframes pulseExpand {
                0% {
                    width: 10px;
                    height: 10px;
                    opacity: 0.6;
                    border-color: rgba(var(--accent-rgb), 0.2);
                }

                100% {
                    width: 900px;
                    height: 900px;
                    opacity: 0;
                    border-color: rgba(var(--accent-rgb), 0);
                }
            }

            #particles,
            #planets,
            #thrustTrail,
            #fx {
                position: fixed;
                inset: 0;
                pointer-events: none;
            }

            #particles {
                z-index: 1;
            }

            #planets {
                z-index: 2;
            }

            #thrustTrail {
                z-index: 4;
            }

            #fx {
                z-index: 3;
            }

            .scanlines {
                position: fixed;
                inset: 0;
                background: repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.04) 2px,
                    rgba(0, 0, 0, 0.04) 4px
                );
                pointer-events: none;
                z-index: 100;
            }

            .free-rocket {
                position: fixed;
                width: var(--rocket-w);
                height: var(--rocket-h);
                pointer-events: none;
                z-index: 5;
                opacity: 0.5;
                filter: drop-shadow(0 0 6px rgba(var(--accent-rgb), 0.15));
                transition:
                    opacity 0.5s ease,
                    filter 0.5s ease;
                will-change: transform;
            }

            .free-rocket.cruising {
                opacity: 0.65;
                filter: drop-shadow(0 0 8px rgba(var(--accent-rgb), 0.25));
            }

            .free-rocket.boosting {
                opacity: 1;
                filter: drop-shadow(0 0 14px rgba(var(--accent-rgb), 0.5))
                    drop-shadow(0 0 40px rgba(var(--accent-rgb), 0.15));
            }

            .free-rocket.warping {
                opacity: 1;
                filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.6))
                    drop-shadow(0 0 60px rgba(245, 158, 11, 0.2));
            }

            .free-rocket.orbiting {
                opacity: 0.9;
                filter: drop-shadow(0 0 12px rgba(6, 182, 212, 0.5))
                    drop-shadow(0 0 30px rgba(6, 182, 212, 0.15));
            }

            .free-rocket svg {
                width: 100%;
                height: 100%;
            }

            .flame-outer,
            .flame-mid,
            .flame-inner {
                transform-box: fill-box;
                transform-origin: top center;
            }

            .flame-outer {
                animation: flameWave1 0.18s ease-in-out infinite alternate;
            }

            .flame-mid {
                animation: flameWave2 0.14s ease-in-out infinite alternate;
            }

            .flame-inner {
                animation: flameWave3 0.1s ease-in-out infinite alternate;
            }

            @keyframes flameWave1 {
                0% {
                    transform: scaleY(0.85) scaleX(0.9);
                }

                100% {
                    transform: scaleY(1.15) scaleX(1.1);
                }
            }

            @keyframes flameWave2 {
                0% {
                    transform: scaleY(0.8) scaleX(0.85);
                }

                100% {
                    transform: scaleY(1.2) scaleX(1.15);
                }
            }

            @keyframes flameWave3 {
                0% {
                    transform: scaleY(0.75) scaleX(0.8);
                }

                100% {
                    transform: scaleY(1.25) scaleX(1.2);
                }
            }

            .free-rocket.boosting .flame-outer {
                animation-duration: 0.08s;
            }

            .free-rocket.boosting .flame-mid {
                animation-duration: 0.06s;
            }

            .free-rocket.boosting .flame-inner {
                animation-duration: 0.04s;
            }

            .rocket-tooltip {
                position: fixed;
                z-index: 6;
                pointer-events: none;
                font-family: "JetBrains Mono", monospace;
                font-size: clamp(0.45rem, 1.2vw, 0.55rem);
                line-height: 1.6;
                letter-spacing: 0.03em;
                white-space: nowrap;
                padding: clamp(4px, 0.8vw, 6px) clamp(6px, 1.2vw, 10px);
                background: rgba(10, 10, 10, 0.85);
                border: 1px solid rgba(var(--accent-rgb), 0.12);
                opacity: 0;
                transform: translateY(4px);
                transition:
                    opacity 0.35s ease,
                    transform 0.35s ease;
                backdrop-filter: blur(6px);
            }

            .rocket-tooltip.visible {
                opacity: 1;
                transform: translateY(0);
            }

            .rocket-tooltip.dim {
                opacity: 0.2;
                transform: translateY(2px);
            }

            .tt-label {
                color: #444;
                font-weight: 300;
            }

            .tt-val {
                color: var(--muted);
                font-weight: 400;
            }

            .tt-val.active {
                color: var(--accent);
                text-shadow: 0 0 6px rgba(var(--accent-rgb), 0.3);
            }

            .tt-val.cyan {
                color: #06b6d4;
                text-shadow: 0 0 6px rgba(6, 182, 212, 0.3);
            }

            .tt-val.amber {
                color: #f59e0b;
                text-shadow: 0 0 6px rgba(245, 158, 11, 0.3);
            }

            .tt-val.rose {
                color: #f43f5e;
                text-shadow: 0 0 6px rgba(244, 63, 94, 0.3);
            }

            .tt-val.emerald {
                color: #10b981;
                text-shadow: 0 0 6px rgba(16, 185, 129, 0.3);
            }

            .tt-bar-track {
                display: inline-block;
                width: clamp(32px, 6vw, 48px);
                height: 4px;
                background: #1a1a1a;
                vertical-align: middle;
                margin-left: 4px;
                border-radius: 2px;
                overflow: hidden;
                position: relative;
                top: -1px;
            }

            .tt-bar-fill {
                display: block;
                height: 100%;
                background: var(--accent);
                border-radius: 2px;
                box-shadow: 0 0 4px rgba(var(--accent-rgb), 0.3);
                transition: width 0.15s ease;
                width: 0%;
            }

            .hud-compass {
                position: fixed;
                z-index: 10;
                pointer-events: none;
                width: 70px;
                height: 70px;
                border: 1px solid rgba(var(--accent-rgb), 0.08);
                border-radius: 50%;
                opacity: 0;
                transition: opacity 0.6s ease;
            }

            .hud-compass.visible {
                opacity: 1;
            }

            .hud-compass-inner {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .hud-compass-needle {
                width: 2px;
                height: 24px;
                background: linear-gradient(
                    to bottom,
                    var(--accent),
                    transparent
                );
                transform-origin: center bottom;
                position: absolute;
                top: 11px;
                border-radius: 1px;
                box-shadow: 0 0 4px rgba(var(--accent-rgb), 0.3);
                transition: transform 0.15s ease;
            }

            .hud-compass-center {
                width: 4px;
                height: 4px;
                background: var(--accent);
                border-radius: 50%;
                box-shadow: 0 0 6px rgba(var(--accent-rgb), 0.5);
            }

            .hud-compass-label {
                position: absolute;
                font-size: 0.35rem;
                color: #333;
                font-family: "JetBrains Mono", monospace;
                letter-spacing: 0.05em;
            }

            .hud-compass-label.n {
                top: 2px;
                left: 50%;
                transform: translateX(-50%);
                color: #444;
            }

            .hud-compass-label.s {
                bottom: 2px;
                left: 50%;
                transform: translateX(-50%);
            }

            .hud-compass-label.e {
                right: 3px;
                top: 50%;
                transform: translateY(-50%);
            }

            .hud-compass-label.w {
                left: 3px;
                top: 50%;
                transform: translateY(-50%);
            }

            .hud-speed {
                position: fixed;
                z-index: 10;
                pointer-events: none;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.45rem;
                color: #333;
                letter-spacing: 0.05em;
                opacity: 0;
                transition: opacity 0.6s ease;
            }

            .hud-speed.visible {
                opacity: 1;
            }

            .hud-speed-bar {
                width: 60px;
                height: 3px;
                background: #1a1a1a;
                border-radius: 2px;
                margin-top: 4px;
                overflow: hidden;
            }

            .hud-speed-fill {
                height: 100%;
                width: 0%;
                background: var(--accent);
                border-radius: 2px;
                box-shadow: 0 0 4px rgba(var(--accent-rgb), 0.3);
                transition: width 0.1s ease;
            }

            .hud-mode {
                position: fixed;
                z-index: 10;
                pointer-events: none;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.4rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                padding: 3px 8px;
                border: 1px solid #1a1a1a;
                background: rgba(10, 10, 10, 0.8);
                opacity: 0;
                transition:
                    opacity 0.4s ease,
                    color 0.4s ease,
                    border-color 0.4s ease;
            }

            .hud-mode.visible {
                opacity: 1;
            }

            .hud-mode.attract {
                color: var(--accent);
                border-color: rgba(var(--accent-rgb), 0.2);
            }

            .hud-mode.boost {
                color: #10b981;
                border-color: rgba(16, 185, 129, 0.3);
            }

            .hud-mode.repel {
                color: #f43f5e;
                border-color: rgba(244, 63, 94, 0.2);
            }

            .hud-mode.warp {
                color: #f59e0b;
                border-color: rgba(245, 158, 11, 0.2);
            }

            .hud-mode.orbit {
                color: #06b6d4;
                border-color: rgba(6, 182, 212, 0.2);
            }

            .hud-mode.mine {
                color: #f43f5e;
                border-color: rgba(244, 63, 94, 0.3);
            }

            .hud-mode.tractor {
                color: #10b981;
                border-color: rgba(16, 185, 129, 0.3);
            }

            .terminal {
                position: relative;
                z-index: 10;
                text-align: center;
                opacity: 0;
                animation: fadeIn 0.8s ease 0.2s forwards;
                padding: 0 20px;
                will-change: transform;
            }

            @keyframes fadeIn {
                to {
                    opacity: 1;
                }
            }

            .command-line {
                font-size: clamp(1rem, 5vw, 2.2rem);
                font-weight: 500;
                color: var(--fg);
                display: inline-flex;
                align-items: center;
                letter-spacing: -0.02em;
                white-space: nowrap;
                position: relative;
            }

            .prompt-symbol {
                color: var(--accent);
                margin-right: clamp(2px, 0.5vw, 4px);
                user-select: none;
                text-shadow: 0 0 10px rgba(var(--accent-rgb), 0.3);
            }

            .type-echo {
                position: absolute;
                right: -10px;
                top: 50%;
                width: 4px;
                height: 4px;
                border-radius: 50%;
                background: var(--accent);
                opacity: 0;
                transform: translate(50%, -50%) scale(0);
                pointer-events: none;
            }

            .type-echo.active {
                animation: echoPing 0.5s ease-out forwards;
            }

            @keyframes echoPing {
                0% {
                    opacity: 0.6;
                    transform: translate(50%, -50%) scale(0.5);
                }

                100% {
                    opacity: 0;
                    transform: translate(50%, -50%) scale(3);
                }
            }

            .cursor-blink {
                display: inline-block;
                width: clamp(5px, 1.2vw, 10px);
                height: 1.15em;
                background-color: var(--accent);
                margin-left: 2px;
                vertical-align: text-bottom;
                animation: blink 1s step-end infinite;
                box-shadow:
                    0 0 8px rgba(var(--accent-rgb), 0.5),
                    0 0 20px rgba(var(--accent-rgb), 0.15);
            }

            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }

                50% {
                    opacity: 0;
                }
            }

            .title {
                margin-top: clamp(10px, 2vw, 16px);
                font-size: clamp(0.42rem, 1.4vw, 0.72rem);
                color: var(--muted);
                font-weight: 300;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                opacity: 0;
                transform: translateY(6px);
                transition:
                    opacity 0.7s ease,
                    transform 0.7s ease;
                animation: crtFlicker 4s ease-in-out infinite;
                animation-delay: 3s;
            }

            .title.visible {
                opacity: 1;
                transform: translateY(0);
            }

            @keyframes crtFlicker {
                0%,
                100% {
                    opacity: 1;
                }

                4% {
                    opacity: 0.6;
                }

                5% {
                    opacity: 1;
                }

                50% {
                    opacity: 1;
                }

                54% {
                    opacity: 0.4;
                }

                55% {
                    opacity: 1;
                }
            }

            .title.glitch-active {
                animation: microGlitch 0.2s linear;
            }

            @keyframes microGlitch {
                0% {
                    transform: translate(0);
                }

                20% {
                    transform: translate(-1px, 1px);
                }

                40% {
                    transform: translate(1px, -1px);
                }

                60% {
                    transform: translate(-1px, 0);
                }

                80% {
                    transform: translate(1px, 1px);
                }

                100% {
                    transform: translate(0);
                }
            }

            .cta {
                display: inline-block;
                margin-top: clamp(28px, 5vw, 44px);
                padding: clamp(9px, 1.8vw, 11px) clamp(16px, 3.5vw, 28px);
                font-family: "JetBrains Mono", monospace;
                font-size: clamp(0.6rem, 1.8vw, 0.82rem);
                font-weight: 400;
                color: var(--muted);
                text-decoration: none;
                border: 1px solid #222;
                letter-spacing: 0.06em;
                opacity: 0;
                transform: translateY(10px);
                transition:
                    opacity 0.7s ease,
                    transform 0.7s ease,
                    color 0.3s ease,
                    border-color 0.3s ease,
                    box-shadow 0.3s ease,
                    background-color 0.3s ease;
                will-change: transform;
            }

            .cta.visible {
                opacity: 1;
                transform: translateY(0);

            .cta:hover {
                color: var(--accent);
                border-color: rgba(var(--accent-rgb), 0.5);
                box-shadow:
                    0 0 14px rgba(var(--accent-rgb), 0.1),
                    0 0 45px rgba(var(--accent-rgb), 0.05),
                    inset 0 0 14px rgba(var(--accent-rgb), 0.03);
                background-color: rgba(var(--accent-rgb), 0.03);
                text-shadow: 0 0 8px rgba(var(--accent-rgb), 0.3);

            .cta:active {
                transform: scale(0.97);

            .cta-secondary {
                border-color: #1a1a1a;
                color: #444;

                opacity: 0.7;

                opacity: 1;

            .cta-secondary:focus-visible {
                outline: none;

                border-color: rgba(var(--accent-rgb), 0.4);
                box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.1);

            @keyframes rippleOut {
                0% {
                    width: 10px;
                    height: 10px;

                }

                    width: 120px;
                    height: 120px;
                    opacity: 0;
                }

                position: fixed;

                position: fixed;
                bottom: clamp(10px, 2vw, 20px);

                    border-color 0.3s ease,

            .sound-toggle:hover {

            @keyframes sweepAcross {

                    opacity: 1;
                }

                100% {

                    opacity: 0;
                    width: 2px;
                }
            }

            @keyframes sweepReverse {
                0% {
                    left: calc(100% + 20px);
                    opacity: 0.9;
                    width: 3px;

                    width: 4px;
                    opacity: 1;
                }

                }

            @supports (padding: env(safe-area-inset-bottom)) {

                    );

            @media (prefers-reduced-motion: reduce) {

            }
        </style>
    </head>

        <script>
            var soundOn = false,
                audioCtx = null,
                masterGain = null;
            var droneOsc1, droneOsc2, droneOsc3, droneGain, droneFilter;
            var thrustSource, thrustFilter, thrustGain;
            var planetHumOsc, planetHumGain, planetHumFilter;

            function initAudio() {
                if (audioCtx) return;
                var AC = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AC();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0;
                masterGain.connect(audioCtx.destination);
                droneFilter = audioCtx.createBiquadFilter();
                droneFilter.type = "lowpass";
                droneFilter.frequency.value = 180;
                droneFilter.Q.value = 1.5;
                droneGain = audioCtx.createGain();
                droneGain.gain.value = 0.12;
                droneFilter.connect(droneGain);
                droneGain.connect(masterGain);
                droneOsc1 = audioCtx.createOscillator();
                droneOsc1.type = "sine";
                droneOsc1.frequency.value = 55;
                droneOsc1.connect(droneFilter);
                droneOsc1.start();
                droneOsc2 = audioCtx.createOscillator();
                droneOsc2.type = "sine";
                droneOsc2.frequency.value = 55.3;
                droneOsc2.connect(droneFilter);
                droneOsc2.start();
                droneOsc3 = audioCtx.createOscillator();
                droneOsc3.type = "sine";
                droneOsc3.frequency.value = 82.4;
                var sf = audioCtx.createBiquadFilter();
                sf.type = "lowpass";
                sf.frequency.value = 100;
                droneOsc3.connect(sf);
                sf.connect(droneGain);
                droneOsc3.start();
                var lfo = audioCtx.createOscillator();
                lfo.type = "sine";
                lfo.frequency.value = 0.08;
                var lfoG = audioCtx.createGain();
                lfoG.gain.value = 60;
                lfo.connect(lfoG);
                lfoG.connect(droneFilter.frequency);
                lfo.start();
                var bufLen = audioCtx.sampleRate * 2;
                var nb = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
                var nd = nb.getChannelData(0);
                for (var i = 0; i < bufLen; i++) nd[i] = Math.random() * 2 - 1;
                thrustSource = audioCtx.createBufferSource();
                thrustSource.buffer = nb;
                thrustSource.loop = true;
                thrustFilter = audioCtx.createBiquadFilter();
                thrustFilter.type = "bandpass";
                thrustFilter.frequency.value = 250;
                thrustFilter.Q.value = 0.8;
                thrustGain = audioCtx.createGain();
                thrustGain.gain.value = 0;
                thrustSource.connect(thrustFilter);
                thrustFilter.connect(thrustGain);
                thrustGain.connect(masterGain);
                thrustSource.start();
                planetHumFilter = audioCtx.createBiquadFilter();
                planetHumFilter.type = "lowpass";
                planetHumFilter.frequency.value = 200;
                planetHumGain = audioCtx.createGain();
                planetHumGain.gain.value = 0;
                planetHumOsc = audioCtx.createOscillator();
                planetHumOsc.type = "sine";
                planetHumOsc.frequency.value = 90;
                planetHumOsc.connect(planetHumFilter);
                planetHumFilter.connect(planetHumGain);
                planetHumGain.connect(masterGain);
                planetHumOsc.start();
                masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
                masterGain.gain.linearRampToValueAtTime(
                    1,
                    audioCtx.currentTime + 1.5,
                );
            }

            var clickNoiseBuffer = null;
            function playTypeClick() {
                if (!audioCtx || !soundOn) return;
                var t = audioCtx.currentTime;
                if (!clickNoiseBuffer) {
                    var bl = Math.floor(audioCtx.sampleRate * 0.03);
                    clickNoiseBuffer = audioCtx.createBuffer(
                        1,
                        bl,
                        audioCtx.sampleRate,
                    );
                    var d = clickNoiseBuffer.getChannelData(0);
                    for (var i = 0; i < bl; i++) d[i] = Math.random() * 2 - 1;
                }
                var ns = audioCtx.createBufferSource();
                ns.buffer = clickNoiseBuffer;
                var nf = audioCtx.createBiquadFilter();
                nf.type = "highpass";
                nf.frequency.value = 1800;
                var ng = audioCtx.createGain();
                ng.gain.setValueAtTime(0.07, t);
                ng.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
                ns.connect(nf);
                nf.connect(ng);
                ng.connect(masterGain);
                ns.start(t);
                ns.stop(t + 0.03);
                var o = audioCtx.createOscillator();
                o.type = "square";
                o.frequency.value = 1200 + Math.random() * 800;
                var og = audioCtx.createGain();
                og.gain.setValueAtTime(0.015, t);
                og.gain.exponentialRampToValueAtTime(0.001, t + 0.015);
                var of2 = audioCtx.createBiquadFilter();
                of2.type = "bandpass";
                of2.frequency.value = 3500;
                of2.Q.value = 1;
                o.connect(of2);
                of2.connect(og);
                og.connect(masterGain);
                o.start(t);
                o.stop(t + 0.015);
            }
            function playBoost() {
                if (!audioCtx || !soundOn) return;
                var t = audioCtx.currentTime;
                var o = audioCtx.createOscillator();
                o.type = "sawtooth";
                o.frequency.setValueAtTime(250, t);
                o.frequency.exponentialRampToValueAtTime(60, t + 0.35);
                var g = audioCtx.createGain();
                g.gain.setValueAtTime(0.1, t);
                g.gain.linearRampToValueAtTime(0, t + 0.35);
                var f = audioCtx.createBiquadFilter();
                f.type = "lowpass";
                f.frequency.setValueAtTime(1200, t);
                f.frequency.linearRampToValueAtTime(150, t + 0.35);
                o.connect(f);
                f.connect(g);
                g.connect(masterGain);
                o.start(t);
                o.stop(t + 0.35);
            }
            function playWarp() {
                if (!audioCtx || !soundOn) return;
                var t = audioCtx.currentTime;
                var o = audioCtx.createOscillator();
                o.type = "sine";
                o.frequency.setValueAtTime(200, t);
                o.frequency.exponentialRampToValueAtTime(2000, t + 0.15);
                o.frequency.exponentialRampToValueAtTime(80, t + 0.5);
                var g = audioCtx.createGain();
                g.gain.setValueAtTime(0.15, t);
                g.gain.linearRampToValueAtTime(0, t + 0.5);
                var f = audioCtx.createBiquadFilter();
                f.type = "lowpass";
                f.frequency.setValueAtTime(300, t);
                f.frequency.linearRampToValueAtTime(3000, t + 0.15);
                f.frequency.linearRampToValueAtTime(100, t + 0.5);
                o.connect(f);
                f.connect(g);
                g.connect(masterGain);
                o.start(t);
                o.stop(t + 0.5);
            }
            function playOrbit() {
                if (!audioCtx || !soundOn) return;
                var t = audioCtx.currentTime;
                var o = audioCtx.createOscillator();
                o.type = "sine";
                o.frequency.setValueAtTime(300, t);
                o.frequency.linearRampToValueAtTime(600, t + 0.3);
                var g = audioCtx.createGain();
                g.gain.setValueAtTime(0.08, t);
                g.gain.linearRampToValueAtTime(0.04, t + 0.6);
                g.gain.linearRampToValueAtTime(0, t + 0.8);
                o.connect(g);
                g.connect(masterGain);
                o.start(t);
                o.stop(t + 0.8);
            }
            function playShockwave() {
                if (!audioCtx || !soundOn) return;
                var t = audioCtx.currentTime;
                var o = audioCtx.createOscillator();
                o.type = "sawtooth";
                o.frequency.setValueAtTime(80, t);
                o.frequency.exponentialRampToValueAtTime(20, t + 0.6);
                var g = audioCtx.createGain();
                g.gain.setValueAtTime(0.2, t);
                g.gain.linearRampToValueAtTime(0, t + 0.6);
                var f = audioCtx.createBiquadFilter();
                f.type = "lowpass";
                f.frequency.setValueAtTime(600, t);
                f.frequency.exponentialRampToValueAtTime(40, t + 0.6);
                o.connect(f);
                f.connect(g);
                g.connect(masterGain);
                o.start(t);
                o.stop(t + 0.6);
                var ns = audioCtx.createBufferSource();
                var bl2 = audioCtx.sampleRate;
                var nb2 = audioCtx.createBuffer(1, bl2, audioCtx.sampleRate);
                var nd2 = nb2.getChannelData(0);
                for (var i = 0; i < bl2; i++) nd2[i] = Math.random() * 2 - 1;
                ns.buffer = nb2;
                var nf = audioCtx.createBiquadFilter();
                nf.type = "lowpass";
                nf.frequency.setValueAtTime(800, t);
                nf.frequency.exponentialRampToValueAtTime(50, t + 0.4);
                var ng = audioCtx.createGain();
                ng.gain.setValueAtTime(0.15, t);
                ng.gain.linearRampToValueAtTime(0, t + 0.4);
                ns.connect(nf);
                nf.connect(ng);
                ng.connect(masterGain);
                ns.start(t);
                ns.stop(t + 0.4);
            }

            function playSpark() {
                if (!audioCtx || !soundOn) return;
                var t = audioCtx.currentTime;
                for (var i = 0; i < 3; i++) {
                    var o = audioCtx.createOscillator();
                    o.type = "square";
                    o.frequency.value = 2000 + Math.random() * 3000;
                    var g = audioCtx.createGain();
                    g.gain.setValueAtTime(0.02, t + i * 0.02);
                    g.gain.exponentialRampToValueAtTime(
                        0.001,
                        t + i * 0.02 + 0.04,
                    );
                    o.connect(g);
                    g.connect(masterGain);
                    o.start(t + i * 0.02);

                }

            function updateAudio() {
                if (!audioCtx || !soundOn) return;
                var t = audioCtx.currentTime + 0.05;
                var sn = Math.min(rocket.speed / 5, 1);

                thrustGain.gain.setTargetAtTime(sn * 0.08, t, 0.1);
                thrustFilter.frequency.setTargetAtTime(200 + sn * 600, t, 0.1);
                thrustFilter.Q.setTargetAtTime(0.5 + sn * 1.5, t, 0.1);

                // Calculate planet proximity
                var maxInf = 0;
                for (var i = 0; i < planets.length; i++) {
                    var dx = rocket.x - planets[i].x,
                        dy = rocket.y - planets[i].y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (
                        dist < planets[i].gravRange &&
                        dist > planets[i].safeZone
                    ) {
                        var inf = 1 - dist / planets[i].gravRange;
                        if (inf > maxInf) maxInf = inf;
                    }
                }

                // Planet hum audio guard
                planetHumGain.gain.setTargetAtTime(maxInf * 0.06, t, 0.15);
                planetHumFilter.frequency.setTargetAtTime(
                    80 + maxInf * 250,
                    t,
                    0.15,
                );
                planetHumOsc.frequency.setTargetAtTime(
                    70 + maxInf * 50,
                    t,
                    0.15,
                );
            }

            function shortAngle(from, to) {

            function getRocketExitOffset() {

            var trail = [];

            function spawnTrail(heavy) {
                var rad = rocket.angle * (Math.PI / 180);
                var sinA = Math.sin(rad),
                    cosA = Math.cos(rad);
                var fdx = -sinA,
                    fdy = cosA,
                    ppx = cosA,
                    ppy = -sinA;
                var eo = getRocketExitOffset();
                var ex = rocket.x + fdx * eo,
                    ey = rocket.y + fdy * eo;
                var count = heavy ? 3 : 1;
                var col =
                    rocket.mode === "warp"
                        ? "245,158,11"
                        : rocket.mode === "orbit"
                          ? "6,182,212"
                          : rocket.slowTimer > 0
                            ? "6,182,212"
                            : "167,139,250";
                for (var i = 0; i < count; i++) {
                    var sp = (Math.random() - 0.5) * 2,
                        fw = 2 + Math.random() * 6;
                    trail.push({
                        x: ex + fdx * fw + ppx * sp * 6,
                        y: ey + fdy * fw + ppy * sp * 6,
                        vx: fdx * (0.4 + Math.random() * 0.8) + ppx * sp * 0.15,
                        vy: fdy * (0.4 + Math.random() * 0.8) + ppy * sp * 0.15,
                        life: 1,
                        decay: 0.012 + Math.random() * 0.018,
                        size: heavy
                            ? 1.5 + Math.random() * 3
                            : 0.8 + Math.random() * 2,
                        color: col,
                    });
                }
                while (trail.length > cfg.maxTrail) trail.shift();
            }
            function drawTrail() {
                tCtx.clearRect(0, 0, tCanvas.width, tCanvas.height);
                for (var i = trail.length - 1; i >= 0; i--) {
                    var p = trail[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.97;
                    p.vy *= 0.97;
                    p.life -= p.decay;
                    p.size *= 0.985;
                    if (p.life <= 0) {
                        trail.splice(i, 1);
                        continue;
                    }
                    tCtx.beginPath();
                    tCtx.arc(p.x, p.y, Math.max(0.1, p.size), 0, Math.PI * 2);
                    tCtx.fillStyle =
                        "rgba(" + p.color + "," + p.life * 0.4 + ")";
                    tCtx.fill();
                }
            }

            var bgParticles = [];
            function initBgParticles() {
                bgParticles = [];
                for (var i = 0; i < cfg.particles; i++) {
                    bgParticles.push({
                        x: Math.random() * bgC.width,
                        y: Math.random() * bgC.height,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: (Math.random() - 0.5) * 0.3,
                        r: Math.random() * 1.5 + 0.5,
                        ba: Math.random() * 0.4 + 0.1,
                        a: 0,
                        ps: Math.random() * 0.01 + 0.005,
                        po: Math.random() * Math.PI * 2,
                    });
                }
            }
            initBgParticles();
            var fr = 0;
            function drawBg() {
                fr++;
                bgX.clearRect(0, 0, bgC.width, bgC.height);
                for (var i = 0; i < bgParticles.length; i++) {
                    var p = bgParticles[i];
                    if (mouseActive) {
                        var pdx = mouseX - p.x,
                            pdy = mouseY - p.y;
                        var pd = Math.sqrt(pdx * pdx + pdy * pdy);
                        if (pd < 200 && pd > 5) {
                            var pull = 0.003 * (1 - pd / 200);
                            p.vx += (pdx / pd) * pull;
                            p.vy += (pdy / pd) * pull;
                        }
                    }
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.995;
                    p.vy *= 0.995;
                    if (p.x < 0) p.x = bgC.width;
                    if (p.x > bgC.width) p.x = 0;
                    if (p.y < 0) p.y = bgC.height;
                    if (p.y > bgC.height) p.y = 0;
                    p.a = Math.max(0, p.ba + Math.sin(fr * p.ps + p.po) * 0.15);
                    bgX.beginPath();
                    bgX.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    bgX.fillStyle = "rgba(167,139,250," + p.a + ")";
                    bgX.fill();
                }
                if (cfg.connectDist > 0) {
                    var cSq = cfg.connectDist * cfg.connectDist;
                    for (var i = 0; i < bgParticles.length; i++) {
                        for (var j = i + 1; j < bgParticles.length; j++) {
                            var dx = bgParticles[i].x - bgParticles[j].x,
                                dy = bgParticles[i].y - bgParticles[j].y;
                            var dSq = dx * dx + dy * dy;
                            if (dSq < cSq) {
                                var d = Math.sqrt(dSq);
                                bgX.beginPath();
                                bgX.moveTo(bgParticles[i].x, bgParticles[i].y);
                                bgX.lineTo(bgParticles[j].x, bgParticles[j].y);
                                bgX.strokeStyle =
                                    "rgba(167,139,250," +
                                    (1 - d / cfg.connectDist) * 0.08 +
                                    ")";
                                bgX.lineWidth = 0.5;
                                bgX.stroke();
                            }
                        }
                    }
                }
            }

            var fxParticles = [],
                lightningBolts = [];
            function addFxParticle(x, y, vx, vy, life, size, color) {
                fxParticles.push({
                    x: x,
                    y: y,
                    vx: vx,
                    vy: vy,
                    life: life,
                    maxLife: life,
                    size: size,
                    color: color,
                });
                if (fxParticles.length > 400) fxParticles.shift();
            }
            function addSparkBurst(x, y, count, color) {
                for (var i = 0; i < count; i++) {
                    var a = Math.random() * Math.PI * 2;
                    var sp = 1 + Math.random() * 3;
                    addFxParticle(
                        x,
                        y,
                        Math.cos(a) * sp,
                        Math.sin(a) * sp,
                        0.5 + Math.random() * 0.3,
                        1 + Math.random() * 2,
                        color,
                    );
                }
            }
            function addLightning(x1, y1, x2, y2, color) {
                var points = [{ x: x1, y: y1 }];
                for (var i = 1; i < 8; i++) {
                    var t = i / 8;
                    points.push({
                        x: x1 + (x2 - x1) * t + (Math.random() - 0.5) * 40,
                        y: y1 + (y2 - y1) * t + (Math.random() - 0.5) * 40,
                    });
                }
                points.push({ x: x2, y: y2 });
                lightningBolts.push({
                    points: points,
                    life: 0.3,
                    color: color,
                });
            }
            function drawFx() {
                fxX.clearRect(0, 0, fxC.width, fxC.height);

                for (var l = lightningBolts.length - 1; l >= 0; l--) {
                    var bolt = lightningBolts[l];
                    bolt.life -= 0.02;
                    if (bolt.life <= 0) {
                        lightningBolts.splice(l, 1);
                        continue;
                    }
                    fxX.beginPath();
                    fxX.moveTo(bolt.points[0].x, bolt.points[0].y);
                    for (var p = 1; p < bolt.points.length; p++)
                        fxX.lineTo(bolt.points[p].x, bolt.points[p].y);
                    fxX.strokeStyle =
                        "rgba(" + bolt.color + "," + bolt.life * 0.8 + ")";
                    fxX.lineWidth = bolt.life * 2;
                    fxX.stroke();
                    fxX.strokeStyle =
                        "rgba(" + bolt.color + "," + bolt.life * 0.2 + ")";
                    fxX.lineWidth = bolt.life * 6;
                    fxX.stroke();
                }
                for (var i = 0; i < planets.length; i++) {
                    var proj = planets[i].softLockProj;
                    if (!proj) continue;
                    var pdx = rocket.x - proj.x,
                        pdy = rocket.y - proj.y,
                        pd = Math.sqrt(pdx * pdx + pdy * pdy);
                    if (pd > 0) {
                        proj.vx += (pdx / pd) * 0.6;
                        proj.vy += (pdy / pd) * 0.6;
                    }
                    proj.vx *= 0.92;
                    proj.vy *= 0.92;
                    proj.x += proj.vx;
                    proj.y += proj.vy;
                    proj.life -= 0.008;
                    if (rocket.trailTick % 2 === 0)
                        addFxParticle(
                            proj.x + (Math.random() - 0.5) * 4,
                            proj.y + (Math.random() - 0.5) * 4,
                            (Math.random() - 0.5) * 0.3,
                            (Math.random() - 0.5) * 0.3,
                            0.3,
                            1.5,
                            "6,182,212",
                        );
                    if (pd < 18) {
                        rocket.slowTimer = 3.0;
                        addSparkBurst(proj.x, proj.y, 15, "6,182,212");
                        playSpark();
                        planets[i].softLockProj = null;
                        continue;
                    }
                    if (proj.life <= 0) {
                        planets[i].softLockProj = null;
                        continue;
                    }
                    var grd = fxX.createRadialGradient(
                        proj.x,
                        proj.y,
                        0,
                        proj.x,
                        proj.y,
                        12,
                    );
                    grd.addColorStop(0, "rgba(6,182,212,0.6)");
                    grd.addColorStop(1, "rgba(6,182,212,0)");
                    fxX.fillStyle = grd;
                    fxX.beginPath();
                    fxX.arc(proj.x, proj.y, 12, 0, Math.PI * 2);
                    fxX.fill();
                    fxX.fillStyle = "rgba(6,182,212,0.9)";
                    fxX.beginPath();
                    fxX.arc(proj.x, proj.y, 3, 0, Math.PI * 2);
                    fxX.fill();
                }
                for (var i = fxParticles.length - 1; i >= 0; i--) {
                    var p = fxParticles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.96;
                    p.vy *= 0.96;
                    p.life -= 0.016;
                    if (p.life <= 0) {
                        fxParticles.splice(i, 1);
                        continue;
                    }
                    fxX.beginPath();
                    fxX.arc(
                        p.x,
                        p.y,
                        Math.max(0.1, p.size * (p.life / p.maxLife)),
                        0,
                        Math.PI * 2,
                    );
                    fxX.fillStyle =
                        "rgba(" +
                        p.color +
                        "," +
                        (p.life / p.maxLife) * 0.8 +
                        ")";
                    fxX.fill();
                }
            }

            function updatePlanets() {
                var w = window.innerWidth,
                    h = window.innerHeight,
                    cx = w / 2,
                    cy = h / 2,
                    minCD = Math.min(w, h) * 0.22;
                for (var i = 0; i < planets.length; i++) {
                    var p = planets[i];
                    if (p.consumed) continue;
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.999;
                    p.vy *= 0.999;
                    var cdx = p.x - cx,
                        cdy = p.y - cy,
                        cdist = Math.sqrt(cdx * cdx + cdy * cdy);
                    if (cdist < minCD && cdist > 0) {
                        var rep = (1 - cdist / minCD) * 0.015;
                        p.vx += (cdx / cdist) * rep;
                        p.vy += (cdy / cdist) * rep;
                    }
                    var pad = p.radius + 20;
                    if (p.x < -pad) p.x = w + pad;
                    if (p.x > w + pad) p.x = -pad;
                    if (p.y < -pad) p.y = h + pad;
                    if (p.y > h + pad) p.y = -pad;
                    p.rotation += p.isBlackHole ? 0.03 : p.rotSpeed;
                    if (p.moon) {
                        p.moon.prevX = p.moon.x || 0;
                        p.moon.prevY = p.moon.y || 0;
                        p.moon.x = p.x + Math.cos(p.moon.angle) * p.moon.dist;
                        p.moon.y =
                            p.y + Math.sin(p.moon.angle) * p.moon.dist * 0.38;
                        p.moon.angle += p.moon.speed;
                    }
                    if (p.pulseTimer > 0) {
                        p.pulseTimer -= 0.008;
                        if (p.pulseTimer < 0) p.pulseTimer = 0;
                    }
                    if (p.pingTimer > 0) {
                        p.pingTimer -= 0.016;
                        if (p.pingTimer < 0) p.pingTimer = 0;
                    }
                    if (p.skillCooldown > 0) p.skillCooldown -= 0.016;
                    if (p.orbitActive) {
                        if (p.skillTimer <= 0) {
                            p.orbitActive = false;
                            p.skillActive = false;
                            if (
                                rocket.mode === "orbit" &&
                                rocket.orbitPlanet === p
                            ) {
                                rocket.mode = "wander";
                                rocket.orbitPlanet = null;
                                pickWander();
                            }
                        } else {
                            p.skillTimer -= 0.016;
                        }
                    }
                    if (
                        p.skill === "warp" &&
                        p.skillActive &&
                        p.skillTimer <= 0
                    ) {
                        p.skillActive = false;
                    }
                    if (p.shockwaveRing > 0) {
                        p.shockwaveRing -= 0.012;
                        if (p.shockwaveRing < 0) p.shockwaveRing = 0;
                    }
                    var tg = p.baseGlow;
                    var rdx = rocket.x - p.x,
                        rdy = rocket.y - p.y,
                        rd = Math.sqrt(rdx * rdx + rdy * rdy);
                    if (rd < p.gravRange) tg += (1 - rd / p.gravRange) * 0.12;
                    if (p.pulseTimer > 0) tg += p.pulseTimer * 0.1;
                    if (p === hoveredPlanet) tg += 0.12;
                    if (p.skillActive || p.shockwaveRing > 0 || p.softLockProj)
                        tg += 0.15;
                    p.glowIntensity += (tg - p.glowIntensity) * 0.06;
                }
            }

            function drawPlanets() {
                plCtx.clearRect(0, 0, plCanvas.width, plCanvas.height);
                plCtx.save();
                plCtx.setLineDash([3, 7]);
                for (var i = 0; i < planets.length; i++) {
                    var p = planets[i];
                    if (p.consumed) continue;
                    var dx = rocket.x - p.x,
                        dy = rocket.y - p.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    var color =
                        p.color[0] + "," + p.color[1] + "," + p.color[2];
                    if (dist < p.gravRange && dist > p.safeZone) {
                        plCtx.beginPath();
                        plCtx.moveTo(p.x, p.y);
                        plCtx.lineTo(rocket.x, rocket.y);
                        plCtx.strokeStyle =
                            "rgba(" +
                            color +
                            "," +
                            (1 - dist / p.gravRange) * 0.1 +
                            ")";
                        plCtx.lineWidth = 0.5;
                        plCtx.stroke();
                    }
                }
                plCtx.restore();
                for (var i = 0; i < planets.length; i++) {
                    var p = planets[i],
                        r = Math.max(0.01, p.radius),
                        cr = p.color[0],
                        cg = p.color[1],
                        cb = p.color[2];
                    if (p.consumed) continue;
                    if (p.isBlackHole) {
                        var bhIntensity =
                            blackHoleActive && blackHolePlanet === p
                                ? blackHoleIntensity
                                : 0;
                        var bhR = Math.max(
                            0.01,
                            p.radius * (1 + bhIntensity * 2),
                        );

                        // 1. The Absolute Void (Pure black, drawing slightly larger to cleanly eat the background)
                        plCtx.beginPath();
                        plCtx.arc(p.x, p.y, bhR * 1.1, 0, Math.PI * 2);
                        plCtx.fillStyle = "#000000";
                        plCtx.fill();

                        // 2. The Event Horizon (A single, razor-thin, faint white stroke just to define the edge)
                        plCtx.beginPath();
                        plCtx.arc(p.x, p.y, bhR * 1.1, 0, Math.PI * 2);
                        plCtx.strokeStyle = "rgba(255, 255, 255, 0.06)";
                        plCtx.lineWidth = 1;
                        plCtx.stroke();

                        // 3. Gravity Tether to Rocket (Stripped back to standard grey)
                        var dx = rocket.x - p.x,
                            dy = rocket.y - p.y;
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < p.gravRange && dist > p.safeZone) {
                            plCtx.save();
                            plCtx.setLineDash([3, 7]);
                            plCtx.beginPath();
                            plCtx.moveTo(p.x, p.y);
                            plCtx.lineTo(rocket.x, rocket.y);
                            plCtx.strokeStyle =
                                "rgba(255, 255, 255, " +
                                (1 - dist / p.gravRange) * 0.04 +
                                ")";
                            plCtx.lineWidth = 0.5;
                            plCtx.stroke();
                            plCtx.restore();
                        }

                        continue;
                    }
                    if (p.shockwaveRing > 0) {
                        var swP = 1 - p.shockwaveRing;
                        var swR = swP * p.gravRange * 1.8;
                        plCtx.beginPath();
                        plCtx.arc(p.x, p.y, swR, 0, Math.PI * 2);
                        plCtx.strokeStyle =
                            "rgba(244,63,94," + p.shockwaveRing * 0.5 + ")";
                        plCtx.lineWidth = 3 * p.shockwaveRing;
                        plCtx.stroke();
                        plCtx.strokeStyle =
                            "rgba(255,200,150," + p.shockwaveRing * 0.3 + ")";
                        plCtx.lineWidth = 8 * p.shockwaveRing;
                        plCtx.stroke();
                    }
                    if (p.orbitActive && rocket.orbitPlanet === p) {
                        plCtx.beginPath();
                        plCtx.arc(p.x, p.y, rocket.orbitDist, 0, Math.PI * 2);
                        plCtx.setLineDash([2, 6]);
                        plCtx.strokeStyle = "rgba(6,182,212,0.15)";
                        plCtx.lineWidth = 1;
                        plCtx.stroke();
                        plCtx.setLineDash([]);
                    }
                    var gR = r * 1.8;
                    if (!isFinite(p.x) || !isFinite(p.y) || !isFinite(gR))
                        continue;
                    var aG = plCtx.createRadialGradient(
                        p.x,
                        p.y,
                        r * 0.4,
                        p.x,
                        p.y,
                        gR,
                    );
                    aG.addColorStop(
                        0,
                        "rgba(" +
                            cr +
                            "," +
                            cg +
                            "," +
                            cb +
                            "," +
                            p.glowIntensity +
                            ")",
                    );
                    aG.addColorStop(
                        0.5,
                        "rgba(" +
                            cr +
                            "," +
                            cg +
                            "," +
                            cb +
                            "," +
                            p.glowIntensity * 0.3 +
                            ")",
                    );
                    aG.addColorStop(
                        1,
                        "rgba(" + cr + "," + cg + "," + cb + ",0)",
                    );
                    plCtx.fillStyle = aG;
                    plCtx.beginPath();
                    plCtx.arc(p.x, p.y, gR, 0, Math.PI * 2);
                    plCtx.fill();
                    if (p.pulseTimer > 0) {
                        plCtx.beginPath();
                        plCtx.arc(p.x, p.y, p.gravRange, 0, Math.PI * 2);
                        plCtx.strokeStyle =
                            "rgba(" +
                            cr +
                            "," +
                            cg +
                            "," +
                            cb +
                            "," +
                            p.pulseTimer * 0.08 +
                            ")";
                        plCtx.lineWidth = 0.5;
                        plCtx.stroke();
                    }
                    if (p.hasRing) {
                        var rr = p.ringColor[0],
                            rg = p.ringColor[1],
                            rb = p.ringColor[2];
                        plCtx.beginPath();
                        plCtx.ellipse(
                            p.x,
                            p.y,
                            r * 1.85,
                            r * 0.42,
                            p.ringTilt,
                            0,
                            Math.PI * 2,
                        );
                        plCtx.strokeStyle =
                            "rgba(" + rr + "," + rg + "," + rb + ",0.18)";
                        plCtx.lineWidth = Math.max(1, r * 0.06);
                        plCtx.stroke();
                        plCtx.beginPath();
                        plCtx.ellipse(
                            p.x,
                            p.y,
                            r * 2.15,
                            r * 0.5,
                            p.ringTilt,
                            0,
                            Math.PI * 2,
                        );
                        plCtx.strokeStyle =
                            "rgba(" + rr + "," + rg + "," + rb + ",0.08)";
                        plCtx.lineWidth = Math.max(0.5, r * 0.035);
                        plCtx.stroke();
                    }
                    var bG = plCtx.createRadialGradient(
                        p.x - r * 0.3,
                        p.y - r * 0.3,
                        r * 0.05,
                        p.x,
                        p.y,
                        r,
                    );
                    bG.addColorStop(
                        0,
                        "rgba(" + cr + "," + cg + "," + cb + ",0.18)",
                    );
                    bG.addColorStop(
                        0.6,
                        "rgba(" + cr + "," + cg + "," + cb + ",0.07)",
                    );
                    bG.addColorStop(
                        1,
                        "rgba(" + cr + "," + cg + "," + cb + ",0.02)",
                    );
                    plCtx.beginPath();
                    plCtx.arc(p.x, p.y, r, 0, Math.PI * 2);
                    plCtx.fillStyle = bG;
                    plCtx.fill();
                    plCtx.strokeStyle =
                        "rgba(" + cr + "," + cg + "," + cb + ",0.3)";
                    plCtx.lineWidth = 0.8;
                    plCtx.stroke();
                    if (p === hoveredPlanet) {
                        var hR = r * 2.5;
                        var hG = plCtx.createRadialGradient(
                            p.x,
                            p.y,
                            r * 0.5,
                            p.x,
                            p.y,
                            hR,
                        );
                        hG.addColorStop(
                            0,
                            "rgba(" + cr + "," + cg + "," + cb + ",0.1)",
                        );
                        hG.addColorStop(
                            1,
                            "rgba(" + cr + "," + cg + "," + cb + ",0)",
                        );
                        plCtx.fillStyle = hG;
                        plCtx.beginPath();
                        plCtx.arc(p.x, p.y, hR, 0, Math.PI * 2);
                        plCtx.fill();
                        plCtx.beginPath();
                        plCtx.arc(p.x, p.y, r + 5, 0, Math.PI * 2);
                        plCtx.strokeStyle =
                            "rgba(" + cr + "," + cg + "," + cb + ",0.3)";
                        plCtx.lineWidth = 1;
                        plCtx.stroke();
                    }
                    if (p.skillCooldown > 0) {
                        var cdPct = p.skillCooldown / 5.0;
                        plCtx.beginPath();
                        plCtx.arc(
                            p.x,
                            p.y,
                            r + 8,
                            -Math.PI / 2,
                            -Math.PI / 2 + Math.PI * 2 * (1 - cdPct),
                        );
                        plCtx.strokeStyle = "rgba(100,100,100,0.3)";
                        plCtx.lineWidth = 2;
                        plCtx.stroke();
                    }
                    plCtx.save();
                    plCtx.translate(p.x, p.y);
                    plCtx.rotate(p.rotation);
                    plCtx.globalAlpha = 0.12;
                    plCtx.beginPath();
                    plCtx.ellipse(
                        0,
                        -r * 0.3,
                        r * 0.88,
                        Math.max(1, r * 0.12),
                        0,
                        0,
                        Math.PI * 2,
                    );
                    plCtx.strokeStyle = "rgb(" + cr + "," + cg + "," + cb + ")";
                    plCtx.lineWidth = 0.6;
                    plCtx.stroke();
                    plCtx.beginPath();
                    plCtx.ellipse(
                        0,
                        r * 0.2,
                        r * 0.82,
                        Math.max(1, r * 0.1),
                        0,
                        0,
                        Math.PI * 2,
                    );
                    plCtx.stroke();
                    if (r > 20) {
                        plCtx.beginPath();
                        plCtx.ellipse(
                            0,
                            r * 0.55,
                            r * 0.75,
                            Math.max(1, r * 0.08),
                            0,
                            0,
                            Math.PI * 2,
                        );
                        plCtx.stroke();
                    }
                    plCtx.globalAlpha = 1;
                    plCtx.restore();
                    if (p.moon) {
                        var m = p.moon,
                            mx = m.x,
                            my = m.y;
                        if (m.prevX) {
                            plCtx.beginPath();
                            plCtx.moveTo(m.prevX, m.prevY);
                            plCtx.lineTo(mx, my);
                            plCtx.strokeStyle =
                                "rgba(" +
                                m.color[0] +
                                "," +
                                m.color[1] +
                                "," +
                                m.color[2] +
                                ",0.15)";
                            plCtx.lineWidth = 1;
                            plCtx.stroke();
                        }
                        plCtx.beginPath();
                        plCtx.ellipse(
                            p.x,
                            p.y,
                            m.dist,
                            m.dist * 0.38,
                            0,
                            0,
                            Math.PI * 2,
                        );
                        plCtx.strokeStyle =
                            "rgba(" +
                            m.color[0] +
                            "," +
                            m.color[1] +
                            "," +
                            m.color[2] +
                            ",0.04)";
                        plCtx.lineWidth = 0.5;
                        plCtx.stroke();
                        plCtx.beginPath();
                        plCtx.arc(mx, my, m.radius, 0, Math.PI * 2);
                        var mG = plCtx.createRadialGradient(
                            mx - m.radius * 0.3,
                            my - m.radius * 0.3,
                            0,
                            mx,
                            my,
                            m.radius,
                        );
                        mG.addColorStop(
                            0,
                            "rgba(" +
                                m.color[0] +
                                "," +
                                m.color[1] +
                                "," +
                                m.color[2] +
                                ",0.3)",
                        );
                        mG.addColorStop(
                            1,
                            "rgba(" +
                                m.color[0] +
                                "," +
                                m.color[1] +
                                "," +
                                m.color[2] +
                                ",0.08)",
                        );
                        plCtx.fillStyle = mG;
                        plCtx.fill();
                        plCtx.strokeStyle =
                            "rgba(" +
                            m.color[0] +
                            "," +
                            m.color[1] +
                            "," +
                            m.color[2] +
                            ",0.35)";
                        plCtx.lineWidth = 0.5;
                        plCtx.stroke();
                    }
                }
            }

            function exitOrbit() {
                if (rocket.mode !== "orbit" || !rocket.orbitPlanet) return;
                rocket.orbitPlanet.orbitActive = false;
                rocket.orbitPlanet.skillActive = false;
                rocket.orbitPlanet = null;
                rocket.mode = "wander";
                pickWander();
            }
            function exitWarp() {
                if (rocket.mode !== "warp") return;
                rocket.mode = "wander";
                rocket.warpTo = null;
                rocket.warpFrom = null;
                warpFlash.classList.remove("active");
                gridLayer.classList.remove("warp");
                gridLayer.style.filter = "";
                rocket.vx = 0;
