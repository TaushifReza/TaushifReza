                rocket.vy = 0;
                pickWander();
            }

            function updateRocket(now) {
                // Black hole consuming the rocket
                if (blackHoleActive && blackHolePlanet && !rocketConsumed) {
                    var bhdx = blackHolePlanet.x - rocket.x,
                        bhdy = blackHolePlanet.y - rocket.y;
                    var bhDist = Math.sqrt(bhdx * bhdx + bhdy * bhdy);
                    var consumeR =
                        Math.max(window.innerWidth, window.innerHeight) *
                        (0.2 + blackHoleIntensity * 0.4);
                    if (bhDist < consumeR && bhDist > 0.001) {
                        exitOrbit();
                        exitWarp();
                        var force =
                            (1 - bhDist / consumeR) *
                            (0.05 + blackHoleIntensity * 0.15);
                        rocket.vx += (bhdx / bhDist) * force;
                        rocket.vy += (bhdy / bhDist) * force;
                        rocket.vx += (-bhdy / bhDist) * force * 0.8;
                        rocket.vy += (bhdx / bhDist) * force * 0.8;
                        rocket.boostFuel = 0;
                        rocket.mode = "wander";
                        if (bhDist < blackHolePlanet.radius * 1.5) {
                            rocketConsumed = true;
                            rocket.consumedScale = 1.0;
                            rocket.consumedOpacity = 1.0;
                            rocket.origX = rocket.x;
                            rocket.origY = rocket.y;
                            rocket.speed = 0;
                            rocket.vx = 0;
                            rocket.vy = 0;
                        }
                    }
                }
                if (rocketConsumed) {
                    rocketEl.style.transition = "none";
                    rocketEl.style.opacity = "0";
                    rocketEl.offsetHeight; // force reflow
                    rocketEl.style.transition = "";

                    tooltipEl.style.transition = "none";
                    tooltipEl.style.opacity = "0";
                    tooltipEl.offsetHeight; // force reflow
                    tooltipEl.style.transition = "";

                    rocket.trailTick++;
                    rocket.consumedTimer = (rocket.consumedTimer || 0) + 1;
                    if (rocket.consumedTimer > 1000) {
                        stopBlackHole();
                    }
                    return;
                }
                // Speed multiplier decay
                rocket.speedMult += (1.0 - rocket.speedMult) * 0.02;

                // Slow debuff from soft lock
                if (rocket.slowTimer > 0) {
                    rocket.slowTimer -= 0.016;
                    if (rocket.slowTimer < 0) rocket.slowTimer = 0;
                }

                var kx = 0,
                    ky = 0;
                if (keysDown["w"] || keysDown["arrowup"]) ky = -1;
                if (keysDown["s"] || keysDown["arrowdown"]) ky = 1;
                if (keysDown["a"] || keysDown["arrowleft"]) kx = -1;
                if (keysDown["d"] || keysDown["arrowright"]) kx = 1;
                if (kx !== 0 || ky !== 0) {
                    exitOrbit();
                    exitWarp();
                    var kl = Math.sqrt(kx * kx + ky * ky);
                    var kForce = rocket.slowTimer > 0 ? 0.01 : 0.04;
                    rocket.vx += (kx / kl) * kForce;
                    rocket.vy += (ky / kl) * kForce;
                }

                if (rocket.mode === "warp") {
                    if (rocket.warpTo && rocket.warpFrom) {
                        rocket.warpProgress += 0.03;
                        var wp = rocket.warpProgress;
                        rocket.x =
                            rocket.warpFrom.x +
                            (rocket.warpTo.x - rocket.warpFrom.x) * wp;
                        rocket.y =
                            rocket.warpFrom.y +
                            (rocket.warpTo.y - rocket.warpFrom.y) * wp;
                        for (var wi = 0; wi < 4; wi++)
                            addFxParticle(
                                rocket.x + (Math.random() - 0.5) * 30,
                                rocket.y + (Math.random() - 0.5) * 30,
                                (Math.random() - 0.5) * 2,
                                (Math.random() - 0.5) * 2,
                                0.4,
                                2 + Math.random() * 3,
                                "245,158,11",
                            );
                        var wa =
                            Math.atan2(
                                rocket.warpTo.y - rocket.warpFrom.y,
                                rocket.warpTo.x - rocket.warpFrom.x,
                            ) *
                                (180 / Math.PI) +
                            90;
                        rocket.angle += shortAngle(rocket.angle, wa) * 0.2;
                        rocket.speed = 5;
                        updateRocketVisuals();
                        rocket.trailTick++;
                        if (rocket.trailTick % 2 === 0) spawnTrail(true);
                        if (rocket.warpProgress >= 1) {
                            rocket.mode = "wander";
                            rocket.warpTo = null;
                            rocket.warpFrom = null;
                            rocket.vx = 0;
                            rocket.vy = 0;
                            warpFlash.classList.remove("active");
                            gridLayer.classList.remove("warp");
                            setTimeout(function () {
                                gridLayer.style.filter = "";
                            }, 500);
                            addSparkBurst(rocket.x, rocket.y, 20, "245,158,11");
                            playSpark();
                            pickWander();
                        }
                        return;
                    }
                    exitWarp();
                    return;
                }

                if (rocket.mode === "orbit") {
                    if (!rocket.orbitPlanet) {
                        rocket.mode = "wander";
                        pickWander();
                    } else {
                        var op = rocket.orbitPlanet;
                        rocket.orbitAngle += 0.03;
                        rocket.x =
                            op.x +
                            Math.cos(rocket.orbitAngle) * rocket.orbitDist;
                        rocket.y =
                            op.y +
                            Math.sin(rocket.orbitAngle) * rocket.orbitDist;
                        var nextX =
                                op.x +
                                Math.cos(rocket.orbitAngle + 0.03) *
                                    rocket.orbitDist,
                            nextY =
                                op.y +
                                Math.sin(rocket.orbitAngle + 0.03) *
                                    rocket.orbitDist;
                        rocket.vx = nextX - rocket.x;
                        rocket.vy = nextY - rocket.y;
                        rocket.speed = Math.sqrt(
                            rocket.vx * rocket.vx + rocket.vy * rocket.vy,
                        );
                        rocket.angle +=
                            shortAngle(
                                rocket.angle,
                                Math.atan2(rocket.vy, rocket.vx) *
                                    (180 / Math.PI) +
                                    90,
                            ) * 0.15;
                        if (rocket.trailTick % 8 === 0)
                            addFxParticle(
                                rocket.x + (Math.random() - 0.5) * 10,
                                rocket.y + (Math.random() - 0.5) * 10,
                                (Math.random() - 0.5) * 0.5,
                                (Math.random() - 0.5) * 0.5,
                                0.6,
                                1.5,
                                "6,182,212",
                            );
                        updateRocketVisuals();
                        rocket.trailTick++;
                        if (rocket.trailTick % 3 === 0) spawnTrail(false);
                        return;
                    }
                }

                // Normal physics
                if (now - lastWander > 4000 + Math.random() * 3000) {
                    pickWander();
                    lastWander = now;
                }
                var baseAccel = rocket.slowTimer > 0 ? 0.003 : 0.01;
                var accel = baseAccel * rocket.speedMult;
                var tx, ty;
                if (rocket.boostFuel > 0) {
                    tx = rocket.boostX;
                    ty = rocket.boostY;
                    accel = (0.06 + rocket.boostFuel * 0.04) * rocket.speedMult;
                    rocket.boostFuel -= 0.012;
                    if (rocket.boostFuel <= 0) rocket.boostFuel = 0;
                } else {
                    var mI = 0.35;
                    tx = rocket.wanderX * (1 - mI) + mouseX * mI;
                    ty = rocket.wanderY * (1 - mI) + mouseY * mI;
                    if (cfg.proxRange > 0 && mouseActive) {
                        var mdx = rocket.x - mouseX,
                            mdy = rocket.y - mouseY;
                        var md = Math.sqrt(mdx * mdx + mdy * mdy);
                        if (md < cfg.proxRange) {
                            var px = 1 - md / cfg.proxRange;
                            tx = tx * (1 - px * 0.6) + mouseX * (px * 0.6);
                            ty = ty * (1 - px * 0.6) + mouseY * (px * 0.6);
                            accel += px * 0.025 * rocket.speedMult;
                        }
                    }
                }
                var dx = tx - rocket.x,
                    dy = ty - rocket.y,
                    dist = Math.sqrt(dx * dx + dy * dy) || 1;
                rocket.vx += (dx / dist) * accel;
                rocket.vy += (dy / dist) * accel;
                for (var i = 0; i < planets.length; i++) {
                    var p = planets[i],
                        pdx = p.x - rocket.x,
                        pdy = p.y - rocket.y,
                        pd = Math.sqrt(pdx * pdx + pdy * pdy);
                    if (pd === 0) continue;
                    var nx = pdx / pd,
                        ny = pdy / pd;
                    if (pd < p.safeZone) {
                        var rs = Math.min(0.25 * (1 - pd / p.safeZone), 0.08);
                        rocket.vx -= nx * rs;
                        rocket.vy -= ny * rs;
                        if (
                            pd < p.radius * 1.8 &&
                            rocket.speed > 0.3 &&
                            rocket.trailTick % 6 === 0
                        ) {
                            addSparkBurst(
                                rocket.x - nx * 10,
                                rocket.y - ny * 10,
                                4,
                                p.color[0] +
                                    "," +
                                    p.color[1] +
                                    "," +
                                    p.color[2],
                            );
                            playSpark();
                        }
                    } else if (pd < p.gravRange) {
                        var nd = (pd - p.safeZone) / (p.gravRange - p.safeZone);
                        var gc =
                            Math.sin(nd * Math.PI) * 0.7 +
                            Math.sin(nd * Math.PI * 0.5) * 0.3;

                        // Black hole has an exponentially stronger, inescapable pull
                        var gf = p.isBlackHole
                            ? 0.08 * (1 - nd)
                            : Math.min(
                                  p.mass * 0.012 * cfg.gravMult * gc,
                                  0.03,
                              );
                        rocket.vx += nx * gf;
                        rocket.vy += ny * gf;
                    }
                }
                var damp =
                    rocket.slowTimer > 0
                        ? 0.94
                        : rocket.boostFuel > 0
                          ? 0.975
                          : 0.985;
                rocket.vx *= damp;
                rocket.vy *= damp;
                rocket.speed = Math.sqrt(
                    rocket.vx * rocket.vx + rocket.vy * rocket.vy,
                );
                var maxSpd =
                    rocket.slowTimer > 0
                        ? 0.3
                        : rocket.boostFuel > 0
                          ? 5
                          : 1.6 * rocket.speedMult;
                if (rocket.speed > maxSpd) {
                    rocket.vx = (rocket.vx / rocket.speed) * maxSpd;
                    rocket.vy = (rocket.vy / rocket.speed) * maxSpd;
                    rocket.speed = maxSpd;
                }
                rocket.x += rocket.vx;
                rocket.y += rocket.vy;
                var pad = cfg.rocketPad;
                if (rocket.x < -pad) rocket.x = window.innerWidth + pad;
                if (rocket.x > window.innerWidth + pad) rocket.x = -pad;
                if (rocket.y < -pad) rocket.y = window.innerHeight + pad;
                if (rocket.y > window.innerHeight + pad) rocket.y = -pad;
                rocket.angle +=
                    shortAngle(
                        rocket.angle,
                        Math.atan2(rocket.vy, rocket.vx) * (180 / Math.PI) + 90,
                    ) * (rocket.boostFuel > 0 ? 0.12 : 0.06);
                updateRocketVisuals();
                rocket.trailTick++;
                var sr = rocket.boostFuel > 0 ? 1 : rocket.speed > 1 ? 2 : 3;
                if (rocket.trailTick % sr === 0 && rocket.speed > 0.05)
                    spawnTrail(rocket.boostFuel > 0);
            }

            function updateRocketVisuals() {
                rocketEl.classList.remove(
                    "boosting",
                    "cruising",
                    "warping",
                    "orbiting",
                );
                if (rocket.mode === "warp") rocketEl.classList.add("warping");
                else if (rocket.mode === "orbit")
                    rocketEl.classList.add("orbiting");
                else if (rocket.boostFuel > 0)
                    rocketEl.classList.add("boosting");
                else if (rocket.speed > 0.8) rocketEl.classList.add("cruising");
                rocketEl.style.left = rocket.x + "px";
                rocketEl.style.top = rocket.y + "px";
                rocketEl.style.transform =
                    "translate(-50%, -50%) rotate(" + rocket.angle + "deg)";
                var fs =
                    rocket.mode === "warp"
                        ? 1.8
                        : rocket.slowTimer > 0
                          ? 0.3
                          : 0.6 + Math.min(rocket.speed / 1.6, 1) * 0.8;
                rocketEl.querySelector(".flame-group").style.transform =
                    "scale(1," + fs + ")";
                if (rocket.slowTimer > 0)
                    rocketEl.style.opacity =
                        0.5 + Math.sin(performance.now() * 0.01) * 0.3;
                else rocketEl.style.opacity = "";
                updateTooltip();
                updateHUD();
            }
            function toCardinal(deg) {
                var d = ((deg % 360) + 360) % 360;
                return ["N", "NE", "E", "SE", "S", "SW", "W", "NW"][
                    Math.round(d / 45) % 8
                ];
            }
            function updateTooltip() {
                if (window.innerWidth < 480) {
                    tooltipEl.classList.remove("visible", "dim");
                    return;
                }
                var tdi = Math.sqrt(
                    (rocket.x - mouseX) * (rocket.x - mouseX) +
                        (rocket.y - mouseY) * (rocket.y - mouseY),
                );
                var isNear = cfg.proxRange > 0 && tdi < cfg.proxRange;
                tooltipEl.classList.remove("visible", "dim");
                if (isNear) {
                    tooltipEl.classList.add("visible");
                    var rad = rocket.angle * (Math.PI / 180);
                    var nX = rocket.x + Math.sin(-rad) * -30,
                        nY = rocket.y + Math.cos(-rad) * -30;
                    var tl = nX + 22,
                        tt2 = nY - 16;
                    if (tl + 140 > window.innerWidth - 10) tl = nX - 156;
                    if (tt2 < 10) tt2 = 10;
                    if (tt2 + 56 > window.innerHeight - 10)
                        tt2 = window.innerHeight - 66;
                    tooltipEl.style.left = tl + "px";
                    tooltipEl.style.top = tt2 + "px";
                } else {
                    tooltipEl.classList.add("dim");
                    tooltipEl.style.left = rocket.x + 24 + "px";
                    tooltipEl.style.top = rocket.y - 18 + "px";
                }
                ttSpeed.textContent = rocket.speed.toFixed(2);
                var normDeg = ((rocket.angle % 360) + 360) % 360;
                ttHdg.textContent =
                    toCardinal(rocket.angle) +
                    " " +
                    normDeg.toFixed(0) +
                    "\u00B0";
                ttHdg.classList.toggle("active", rocket.speed > 0.1);
                ttBar.style.width =
                    Math.min(100, (rocket.speed / 5) * 100) + "%";
                ttModeRow.style.display = "none";
                if (rocket.slowTimer > 0) {
                    ttThrust.textContent = "LOCKED";
                    ttThrust.className = "tt-val cyan";
                    ttBar.style.background = "#06B6D4";
                    ttBar.style.boxShadow = "0 0 6px rgba(6,182,212,0.5)";
                    ttModeRow.style.display = "block";
                    ttMode.textContent =
                        "SLOW " + rocket.slowTimer.toFixed(1) + "s";
                    ttMode.className = "tt-val cyan";
                } else if (rocket.mode === "warp") {
                    ttThrust.textContent = "WARP";
                    ttThrust.className = "tt-val amber";
                    ttBar.style.background = "#F59E0B";
                    ttBar.style.boxShadow = "0 0 6px rgba(245,158,11,0.5)";
                    ttModeRow.style.display = "block";
                    ttMode.textContent = "HYPERJUMP";
                    ttMode.className = "tt-val amber";
                } else if (rocket.mode === "orbit") {
                    ttThrust.textContent = "ORBIT";
                    ttThrust.className = "tt-val cyan";
                    ttBar.style.background = "#06B6D4";
                    ttBar.style.boxShadow = "0 0 6px rgba(6,182,212,0.5)";
                    ttModeRow.style.display = "block";
                    ttMode.textContent = "LOCKED";
                    ttMode.className = "tt-val cyan";
                } else if (rocket.boostFuel > 0) {
                    ttThrust.textContent = "BOOST";
                    ttThrust.className = "tt-val active";
                    ttBar.style.background = "var(--accent)";
                    ttBar.style.boxShadow =
                        "0 0 6px rgba(var(--accent-rgb),0.5)";
                } else if (rocket.speed > 0.8) {
                    ttThrust.textContent = "CRUISE";
                    ttThrust.className = "tt-val active";
                    ttBar.style.background = "var(--accent)";
                    ttBar.style.boxShadow =
                        "0 0 4px rgba(var(--accent-rgb),0.3)";
                } else if (rocket.speed > 0.1) {
                    ttThrust.textContent = "DRIFT";
                    ttThrust.className = "tt-val";
                    ttBar.style.background = "var(--accent)";
                    ttBar.style.boxShadow =
                        "0 0 2px rgba(var(--accent-rgb),0.1)";
                } else {
                    ttThrust.textContent = "IDLE";
                    ttThrust.className = "tt-val";
                    ttBar.style.background = "#333";
                    ttBar.style.boxShadow = "none";
                }
            }
            function updateHUD() {
                if (window.innerWidth < 480) return;
                compassNeedle.style.transform =
                    "rotate(" + rocket.angle + "deg)";
                hudSpdVal.textContent = rocket.speed.toFixed(2);
                hudSpdFill.style.width =
                    Math.min(100, (rocket.speed / 5) * 100) + "%";
                if (rocket.slowTimer > 0) {
                    hudSpdFill.style.background = "#06B6D4";
                    hudSpdFill.style.boxShadow = "0 0 4px rgba(6,182,212,0.5)";
                } else if (rocket.mode === "warp") {
                    hudSpdFill.style.background = "#F59E0B";
                    hudSpdFill.style.boxShadow = "0 0 4px rgba(245,158,11,0.5)";
                } else if (rocket.mode === "orbit") {
                    hudSpdFill.style.background = "#06B6D4";
                    hudSpdFill.style.boxShadow = "0 0 4px rgba(6,182,212,0.5)";
                } else {
                    hudSpdFill.style.background = "var(--accent)";
                    hudSpdFill.style.boxShadow =
                        "0 0 4px rgba(var(--accent-rgb),0.3)";
                }
                hudMode.className = "hud-mode visible";
                var mult = rocket.speedMult.toFixed(1);
                if (rocket.slowTimer > 0) {
                    hudMode.textContent = "SOFT LOCK";
                    hudMode.classList.add("orbit");
                } else if (rocket.mode === "warp") {
                    hudMode.textContent = "HYPERJUMP";
                    hudMode.classList.add("warp");
                } else if (rocket.mode === "orbit") {
                    hudMode.textContent = "ORBIT LOCK";
                    hudMode.classList.add("orbit");
                } else if (rocket.boostFuel > 0) {
                    hudMode.textContent = "BOOST";
                    hudMode.classList.add("boost");
                } else if (rocket.speedMult > 1.05) {
                    hudMode.textContent = "BOOST x" + mult;
                    hudMode.classList.add("boost");
                } else if (rocket.speedMult < 0.95) {
                    hudMode.textContent = "SLOW x" + mult;
                    hudMode.classList.add("repel");
                } else {
                    hudMode.textContent = "CRUISE";
                    hudMode.classList.add("attract");
                }
            }

            function activatePlanetSkill(planet) {
                if (
                    !initDismissed ||
                    planet.skillCooldown > 0 ||
                    planet.consumed
                )
                    return;
                planet.skillCooldown = 1.5;
                planet.skillActive = true;
                switch (planet.skill) {
                    case "orbit":
                        planet.orbitActive = true;
                        planet.skillTimer = 4.0;
                        rocket.mode = "orbit";
                        rocket.orbitPlanet = planet;
                        var odx = rocket.x - planet.x,
                            ody = rocket.y - planet.y;
                        rocket.orbitDist = Math.max(
                            Math.sqrt(odx * odx + ody * ody),
                            planet.radius * 2.5,
                        );
                        rocket.orbitAngle = Math.atan2(ody, odx);
                        playOrbit();
                        addSparkBurst(planet.x, planet.y, 12, "6,182,212");
                        break;
                    case "warp":
                        planet.skillTimer = 0.5;
                        var targets = planets.filter(function (p) {
                            return p !== planet;
                        });
                        var target =
                            targets[Math.floor(Math.random() * targets.length)];
                        rocket.mode = "warp";
                        rocket.warpFrom = { x: rocket.x, y: rocket.y };
                        rocket.warpTo = { x: target.x, y: target.y };
                        rocket.warpProgress = 0;
                        warpFlash.style.setProperty(
                            "--fx",
                            (rocket.x / window.innerWidth) * 100 + "%",
                        );
                        warpFlash.style.setProperty(
                            "--fy",
                            (rocket.y / window.innerHeight) * 100 + "%",
                        );
                        warpFlash.classList.add("active");
                        gridLayer.classList.add("warp");
                        gridLayer.style.filter = "blur(1px) brightness(1.5)";
                        addLightning(
                            rocket.x,
                            rocket.y,
                            target.x,
                            target.y,
                            "245,158,11",
                        );
                        playWarp();
                        break;
                    case "shockwave":
                        planet.shockwaveRing = 1.0;
                        planet.skillActive = false;
                        var launchAngle =
                            rocket.angle * (Math.PI / 180) - Math.PI / 2;
                        rocket.vx = Math.cos(launchAngle) * 4.5;
                        rocket.vy = Math.sin(launchAngle) * 4.5;
                        addSparkBurst(planet.x, planet.y, 30, "244,63,94");
                        addSparkBurst(planet.x, planet.y, 15, "255,200,150");
                        document.body.style.transform =
                            "translate(" +
                            (Math.random() * 8 - 4) +
                            "px," +
                            (Math.random() * 8 - 4) +
                            "px)";
                        setTimeout(function () {
                            document.body.style.transform = "";
                        }, 200);
                        playShockwave();
                        break;
                    case "softlock":
                        planet.skillActive = false;
                        planet.softLockProj = {
                            x: planet.x,
                            y: planet.y,
                            vx: 0,
                            vy: 0,
                            life: 1.0,
                        };
                        playSoftLock();
                        addSparkBurst(planet.x, planet.y, 8, "6,182,212");
                        break;
                    case "blackhole":
                        planet.skillActive = false;
                        planet.shockwaveRing = 0.6;
                        addSparkBurst(planet.x, planet.y, 8, "167,139,250");
                        addSparkBurst(planet.x, planet.y, 5, "244,63,94");
                        playShockwave();
                        blackHoleImplosion(planet);
                        break;
                }
            }

            function spawnRipple(x, y) {
                var rip = document.createElement("div");
                rip.className = "click-ripple";
                rip.style.left = x + "px";
                rip.style.top = y + "px";
                document.body.appendChild(rip);
                setTimeout(function () {
                    rip.remove();
                }, 700);
            }
            function handleBoost(x, y) {
                if (!initDismissed) return;
                var hit = null;
                for (var i = 0; i < planets.length; i++) {
                    var dx = x - planets[i].x,
                        dy = y - planets[i].y;
                    if (
                        Math.sqrt(dx * dx + dy * dy) <
                        Math.max(planets[i].radius * 2.5, 35)
                    ) {
                        hit = planets[i];
                        break;
                    }
                }
                if (hit && !hit.consumed) {
                    spawnRipple(x, y);
                    document.body.style.transform =
                        "translate(" +
                        (Math.random() * 4 - 2) +
                        "px, " +
                        (Math.random() * 4 - 2) +
                        "px)";
                    setTimeout(function () {
                        document.body.style.transform = "";
                    }, 150);
                    activatePlanetSkill(hit);
                } else {
                    if (cfg.proxRange === 0 && !isTouchDevice) return;
                    spawnRipple(x, y);
                    playBoost();
                    rocket.boostFuel = 1.0;
                    rocket.boostX = x;
                    rocket.boostY = y;
                    exitOrbit();
                    if (rocket.mode === "warp") return;
                    for (var k = 0; k < 8; k++) {
                        var a = Math.random() * Math.PI * 2;
                        addFxParticle(
                            x,
                            y,
                            Math.cos(a) * (1 + Math.random() * 2),
                            Math.sin(a) * (1 + Math.random() * 2),
                            1,
                            1.5 + Math.random() * 2,
                            "167,139,250",
                        );
                    }
                }
            }
            function handleDoubleBoost(x, y) {
                if (!initDismissed || rocket.mode === "warp") return;
                exitOrbit();
                spawnRipple(x, y);
                spawnRipple(x, y);
                addLightning(rocket.x, rocket.y, x, y, "167,139,250");
                rocket.mode = "warp";
                rocket.warpFrom = { x: rocket.x, y: rocket.y };
                rocket.warpTo = { x: x, y: y };
                rocket.warpProgress = 0;
                warpFlash.style.setProperty(
                    "--fx",
                    (rocket.x / window.innerWidth) * 100 + "%",
                );
                warpFlash.style.setProperty(
                    "--fy",
                    (rocket.y / window.innerHeight) * 100 + "%",
                );
                warpFlash.classList.add("active");
                gridLayer.classList.add("warp");
                gridLayer.style.filter = "blur(1px) brightness(1.5)";
                playWarp();
            }

            var lastClickTime = 0;
            document.addEventListener("click", function (e) {
                if (
                    e.target.closest(".cta") ||
                    e.target.closest(".sound-toggle")
                )
                    return;
                var now = Date.now();
                if (now - lastClickTime < 300) {
                    handleDoubleBoost(e.clientX, e.clientY);
                    lastClickTime = 0;
                    return;
                }
                lastClickTime = now;
                setTimeout(function () {
                    if (lastClickTime === now)
                        handleBoost(e.clientX, e.clientY);
                }, 310);
            });
            document.addEventListener(
                "touchend",
                function (e) {
                    if (
                        e.target.closest(".cta") ||
                        e.target.closest(".sound-toggle")
                    )
                        return;
                    handleBoost(
                        e.changedTouches[0].clientX,
                        e.changedTouches[0].clientY,
                    );
                },
                { passive: true },
            );

            // Scroll = speed control (replaces attract/repel)
            document.addEventListener(
                "wheel",
                function (e) {
                    if (!initDismissed) return;
                    e.preventDefault();
                    exitOrbit();
                    if (e.deltaY < 0) {
                        rocket.speedMult = Math.max(
                            rocket.speedMult - 0.5,
                            0.1,
                        );
                    } else {
                        rocket.speedMult = Math.min(rocket.speedMult + 0.5, 10);
                    }
                    spawnRipple(rocket.x, rocket.y);
                },
                { passive: false },
            );

            document.addEventListener("keydown", function (e) {
                keysDown[e.key.toLowerCase()] = true;
                if (e.key === "Escape") {
                    exitOrbit();
                    exitWarp();
                    stopBlackHole();
                }

                // C key to clear screen
                if (
                    (e.key === "b" || e.key === "B") &&
                    !e.ctrlKey &&
                    !e.metaKey &&
                    initDismissed
                ) {
                    e.preventDefault();
                    triggerClearScreen();
                }
            });

            document.addEventListener("keyup", function (e) {
                keysDown[e.key.toLowerCase()] = false;
            });

            (function positionHUD() {
                var hc = document.getElementById("hudCompass"),
                    hs = document.getElementById("hudSpeed"),
                    hm = document.getElementById("hudMode");
                hc.style.top = "clamp(14px,3vw,24px)";
                hc.style.left = "clamp(14px,3vw,24px)";
                hs.style.top = "clamp(90px,10vw,100px)";
                hs.style.left = "clamp(14px,3vw,24px)";
                hm.style.top = "clamp(120px,14vw,134px)";
                hm.style.left = "clamp(14px,3vw,24px)";
            })();

            (function loop(now) {
                checkPlanetHover();
                updatePlanets();
                updateBlackHoleSuction();
                drawPlanets();
                updateRocket(now);
                drawTrail();
                drawBg();
                drawFx();
                updateAudio();
                requestAnimationFrame(loop);
            })(performance.now());

            function initClearRefs() {
                visualLayers = [
                    document.getElementById("gridLayer"),
                    document.getElementById("particles"),
                    document.getElementById("planets"),
                    document.getElementById("thrustTrail"),
                    document.getElementById("fx"),
                    document.getElementById("freeRocket"),
                    document.getElementById("rocketTooltip"),
                    document.getElementById("planetLabel"),
                ];
                hudElements = [
                    document.getElementById("hudCompass"),
                    document.getElementById("hudSpeed"),
                    document.getElementById("hudMode"),
                ];
            }

            var visualLayers, hudElements;

            function triggerClearScreen() {
                if (!initDismissed || blackHoleActive) return;

                var newBH = {
                    x:
                        window.innerWidth * 0.15 +
                        Math.random() * window.innerWidth * 0.7,
                    y:
                        window.innerHeight * 0.15 +
                        Math.random() * window.innerHeight * 0.7,
                    vx: 0,
                    vy: 0,
                    baseRadius: 38,
                    radius: 38 * cfg.planetScale,
                    color: [0, 0, 0],
                    mass: 6.0,
                    name: "Void Singularity",
                    baseGravRange: 300,
                    gravRange: 300 * cfg.planetScale * cfg.gravMult,
                    safeZone: 38 * cfg.planetScale * 2.2,
                    hasRing: false,
                    baseGlow: 0.04,
                    glowIntensity: 0.04,
                    pulseTimer: 0,
                    rotation: 0,
                    rotSpeed: 0.03,
                    moon: null,
                    pingTimer: 0,
                    skill: "blackhole",
                    skillLabel: "EVENT HORIZON",
                    skClass: "sk-mine",
                    skillCooldown: 0,
                    skillActive: false,
                    skillTimer: 0,
                    orbitActive: false,
                    shockwaveRing: 0,
                    softLockProj: null,
                    isBlackHole: true,
                    consumed: false,
                    isDynamic: true,
                };

                planets.push(newBH);
                blackHolePlanet = newBH;
                activatePlanetSkill(blackHolePlanet);
            }

            function updateBlackHoleSuction() {
                if (!blackHoleActive || !blackHolePlanet) return;
                var p = blackHolePlanet;
                var maxDim = Math.max(window.innerWidth, window.innerHeight);
                var suckRange = maxDim * (0.4 + blackHoleIntensity * 0.6);
                var consumeRange = maxDim * (0.15 + blackHoleIntensity * 0.35);

                // Suck in trail particles
                for (var i = trail.length - 1; i >= 0; i--) {
                    var pt = trail[i];
                    var dx = p.x - pt.x,
                        dy = p.y - pt.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < suckRange && dist > 0.001) {
                        var force =
                            (1 - dist / suckRange) *
                            (0.8 + blackHoleIntensity * 1.5);
                        pt.vx += (dx / dist) * force;
                        pt.vy += (dy / dist) * force;
                        pt.decay += 0.005 + blackHoleIntensity * 0.02;
                    }
                    if (dist < p.radius * 1.2) {
                        trail.splice(i, 1);
                    }
                }

                // Suck in background particles - respawn at screen edges at full brightness
                for (var i = bgParticles.length - 1; i >= 0; i--) {
                    var pt = bgParticles[i];
                    var dx = p.x - pt.x,
                        dy = p.y - pt.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < suckRange && dist > 0.001) {
                        var force =
                            (1 - dist / suckRange) *
                            (0.2 + blackHoleIntensity * 0.6);
                        pt.vx += (dx / dist) * force;
                        pt.vy += (dy / dist) * force;
                    }
                    if (dist < p.radius * 1.5) {
                        var edge = Math.floor(Math.random() * 4);
                        var w = window.innerWidth,
                            h = window.innerHeight;
                        if (edge === 0) {
                            pt.x = Math.random() * w;
                            pt.y = -10;
                        } else if (edge === 1) {
                            pt.x = w + 10;
                            pt.y = Math.random() * h;
                        } else if (edge === 2) {
                            pt.x = Math.random() * w;
                            pt.y = h + 10;
                        } else {
                            pt.x = -10;
                            pt.y = Math.random() * h;
                        }
                        pt.vx = (Math.random() - 0.5) * 0.3;
                        pt.vy = (Math.random() - 0.5) * 0.3;
                        pt.a = pt.ba;
                    }
                }

                // Suck in FX particles with spiral
                for (var i = fxParticles.length - 1; i >= 0; i--) {
                    var pt = fxParticles[i];
                    var dx = p.x - pt.x,
                        dy = p.y - pt.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < suckRange && dist > 0.001) {
                        var force =
                            (1 - dist / suckRange) *
                            (1.2 + blackHoleIntensity * 2);
                        pt.vx += (dx / dist) * force;
                        pt.vy += (dy / dist) * force;
                        pt.vx += (-dy / dist) * force * 0.3;
                        pt.vy += (dx / dist) * force * 0.3;
                    }
                    if (dist < p.radius * 1.2) {
                        fxParticles.splice(i, 1);
                    }
                }

                // Pull in normal planets
                for (var i = 0; i < planets.length; i++) {
                    var otherP = planets[i];
                    if (otherP.isBlackHole || otherP.consumed) continue;
                    var dx = otherP.x - p.x,
                        dy = otherP.y - p.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < consumeRange && dist > 0.001) {
                        var force =
                            (1 - dist / consumeRange) *
                            (0.03 + blackHoleIntensity * 0.12);
                        otherP.vx -= (dx / dist) * force;
                        otherP.vy -= (dy / dist) * force;
                        if (dist < p.radius * 2.5) {
                            otherP.consumed = true;
                            otherP.radius = 0;
                            blackHoleConsumed.push(otherP);
                            consumedCount++;
                        }
                    }
                }

                // Screen shake
                if (blackHoleIntensity > 0.1) {
                    var bhdx = rocket.x - p.x,
                        bhdy = rocket.y - p.y;
                    var bhDist = Math.sqrt(bhdx * bhdx + bhdy * bhdy);
                    if (bhDist < maxDim * 0.5 && !rocketConsumed) {
                        var shakeI =
                            (1 - bhDist / (maxDim * 0.5)) * blackHoleIntensity;
                        var shake = shakeI * 10;
                        document.body.style.transform =
                            "translate(" +
                            (Math.random() * shake - shake / 2) +
                            "px," +
                            (Math.random() * shake - shake / 2) +
                            "px)";
                    }
                }
            }

            var blackHoleActive = false,
                blackHoleIntensity = 0,
                blackHolePlanet = null,
                blackHoleShakeTimer = null;
            var blackHoleConsumed = [],
                consumedCount = 0,
                rocketConsumed = false;

            function blackHoleImplosion(planet) {
                blackHoleActive = true;
                blackHoleIntensity = 0;
                blackHolePlanet = planet;
                blackHoleConsumed = [];
                consumedCount = 0;
                rocketConsumed = false;
                planet.glowIntensity = 1.0;

                blackHoleShakeTimer = setInterval(function () {
                    blackHoleIntensity = Math.min(
                        blackHoleIntensity + 0.002,
                        3,
                    );
                    var shake = Math.min(blackHoleIntensity * 12, 12);
                    document.body.style.transform =
                        "translate(" +
                        (Math.random() * shake - shake / 2) +
                        "px," +
                        (Math.random() * shake - shake / 2) +
                        "px)";
                }, 50);

                var suckInterval = setInterval(function () {
                    if (!blackHoleActive) {
                        clearInterval(suckInterval);
                        return;
                    }
                    for (var i = 0; i < 3; i++) {
                        var angle = Math.random() * Math.PI * 2;
                        var dist =
                            planet.radius * 1.5 +
                            Math.random() * planet.radius * 3;
                        var sx = planet.x + Math.cos(angle) * dist;
                        var sy = planet.y + Math.sin(angle) * dist;
                        var toCenterX = planet.x - sx,
                            toCenterY = planet.y - sy;
                        var cDist = Math.max(
                            Math.sqrt(
                                toCenterX * toCenterX + toCenterY * toCenterY,
                            ),
                            0.1,
                        );
                        addFxParticle(
                            sx,
                            sy,
                            (toCenterX / cDist) * 2 * blackHoleIntensity +
                                -Math.sin(angle) * 0.8,
                            (toCenterY / cDist) * 2 * blackHoleIntensity +
                                Math.cos(angle) * 0.8,
                            0.5,
                            0.5 + blackHoleIntensity * 0.4,
                            "167,139,250",
                        );
                    }
                }, 60);
            }

            function stopBlackHole() {
                blackHoleActive = false;
                if (blackHoleShakeTimer) {
                    clearInterval(blackHoleShakeTimer);
                    blackHoleShakeTimer = null;
                }

                for (var i = 0; i < blackHoleConsumed.length; i++) {
                    blackHoleConsumed[i].consumed = false;
                    blackHoleConsumed[i].radius =
                        blackHoleConsumed[i].baseRadius * cfg.planetScale;
                }
                blackHoleConsumed = [];
                consumedCount = 0;

                releaseRocket();

                // Completely remove the spawned black hole from the game
                if (blackHolePlanet) {
                    var idx = planets.indexOf(blackHolePlanet);
                    if (idx > -1) {
                        planets.splice(idx, 1);
                    }
                }
                blackHolePlanet = null;

                var decayStart = performance.now();
                (function decayShake() {
                    var elapsed = (performance.now() - decayStart) / 1000;
                    if (elapsed >= 1) {
                        blackHoleIntensity = 0;
                        document.body.style.transform = "";
                        return;
                    }
                    blackHoleIntensity *= 0.9;
                    if (blackHoleIntensity < 0.01) {
                        blackHoleIntensity = 0;
                        document.body.style.transform = "";
                        return;
                    }
                    var shake = blackHoleIntensity * 12;
                    if (shake > 0.2) {
                        document.body.style.transform =
                            "translate(" +
                            (Math.random() * shake - shake / 2) +
                            "px," +
                            (Math.random() * shake - shake / 2) +
                            "px)";
                    } else {
                        document.body.style.transform = "";
                    }
                    requestAnimationFrame(decayShake);
                })();
            }

            function releaseRocket() {
                rocketConsumed = false;
                rocket.consumedTimer = 0;
                rocketEl.style.transition = "none";
                rocketEl.style.opacity = "";
                rocketEl.style.filter = "";
                rocketEl.offsetHeight; // force reflow
                rocketEl.style.transition = "";

                tooltipEl.style.transition = "none";
                tooltipEl.style.opacity = "";
                tooltipEl.offsetHeight; // force reflow
                tooltipEl.style.transition = "";

                rocket.vx = 0;
                rocket.vy = 0;
                rocket.speed = 0;
                rocket.mode = "wander";
                rocket.boostFuel = 0;
                pickWander();
            }
        </script>
    </body>
</html>
